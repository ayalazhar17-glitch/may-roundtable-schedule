services:
  - type: web
    name: may-roundtable-schedule
    runtime: python
    plan: starter
    buildCommand: ""
    startCommand: python3 app.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PIN
        sync: false
      - key: ORGANIZER_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: FROM_EMAIL
        sync: false
      - key: SEND_USER_CONFIRMATION
        value: "false"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_TO_NUMBER
        sync: false
    disk:
      name: scheduler-data
      mountPath: /var/data
      sizeGB: 1
